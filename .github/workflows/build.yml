name: Build DVtools installers

# Builds all 3 platform packages whenever you push a version tag
# (e.g. `git tag v1.0.0 && git push --tags`), or manually from the
# Actions tab. Each OS is compiled on its OWN native runner because
# Nuitka (like PyInstaller) does not cross-compile: a Windows .exe has
# to be built on a Windows machine, a macOS .app on a Mac, etc. GitHub
# gives you all 3 runners for free on public repos, which is what
# makes this workflow possible without owning 3 machines.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  # ------------------------------------------------------------------
  windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: DVtools
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install nuitka pillow
          choco install innosetup -y --no-progress

      - name: Extract app icon
        run: python packaging/extract_icon.py
        continue-on-error: true

      - name: Build with Nuitka (standalone)
        run: >
          python -m nuitka --standalone
          --enable-plugin=tk-inter
          --windows-console-mode=disable
          --windows-icon-from-ico=packaging/icons/icon.ico
          --include-data-dir=fonts=fonts
          --include-data-dir=plugins=plugins
          --output-dir=build
          --assume-yes-for-downloads
          dvtools_windows.py

      - name: Build installer (Inno Setup)
        run: '"C:\Program Files (x86)\Inno Setup 6\iscc.exe" packaging\windows\installer.iss'

      - name: Also produce a portable .zip (no-install option)
        run: Compress-Archive -Path build\dvtools_windows.dist\* -DestinationPath dist\DVtools-Windows-Portable.zip
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            DVtools/dist/DVtools-Setup-Windows.exe
            DVtools/dist/DVtools-Windows-Portable.zip

  # ------------------------------------------------------------------
  macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: DVtools
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install nuitka pillow
          brew install create-dmg

      - name: Extract app icon
        run: python packaging/extract_icon.py
        continue-on-error: true

      - name: Build with Nuitka (app bundle)
        run: >
          python -m nuitka --standalone
          --enable-plugin=tk-inter
          --macos-create-app-bundle
          --macos-app-name=DVtools
          --macos-app-icon=packaging/icons/icon.icns
          --include-data-dir=fonts=fonts
          --include-data-dir=plugins=plugins
          --output-dir=build
          --assume-yes-for-downloads
          dvtools_macos.py

      - name: Package as .dmg
        run: |
          mkdir -p dist
          create-dmg \
            --volname "DVtools" \
            --window-size 500 300 \
            --icon-size 100 \
            --app-drop-link 360 130 \
            "dist/DVtools-macOS.dmg" \
            "build/dvtools_macos.app" || true
          # create-dmg returns a non-zero exit code on some benign
          # AppleScript Finder warnings even when the .dmg was created
          # successfully, so we verify the actual output file instead
          # of trusting its exit code.
          test -f "dist/DVtools-macOS.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: DVtools/dist/DVtools-macOS.dmg

  # ------------------------------------------------------------------
  linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: DVtools
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk patchelf fuse libfuse2
          python -m pip install --upgrade pip
          pip install nuitka pillow
          curl -L -o /usr/local/bin/appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x /usr/local/bin/appimagetool

      - name: Extract app icon
        run: python packaging/extract_icon.py
        continue-on-error: true

      - name: Build with Nuitka (standalone)
        run: >
          python -m nuitka --standalone
          --enable-plugin=tk-inter
          --include-data-dir=fonts=fonts
          --include-data-dir=plugins=plugins
          --output-dir=build
          --assume-yes-for-downloads
          dvtools_linux.py

      - name: Build AppImage
        run: bash packaging/linux/build_appimage.sh

      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: DVtools/dist/DVtools-Linux-x86_64.AppImage

  # ------------------------------------------------------------------
  release:
    needs: [windows, macos, linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Attach all installers to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows-installers/DVtools-Setup-Windows.exe
            artifacts/windows-installers/DVtools-Windows-Portable.zip
            artifacts/macos-installer/DVtools-macOS.dmg
            artifacts/linux-appimage/DVtools-Linux-x86_64.AppImage
